<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Portal Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
linear-gradient(135deg,#312e81,#06b6d4,#67e8f9);
padding:20px;
}

.card{
width:420px;
background:rgba(255,255,255,.97);
backdrop-filter:blur(20px);
padding:40px;
border-radius:30px;
box-shadow:
0 25px 60px rgba(0,0,0,.20);
}

.logo{
text-align:center;
font-size:52px;
margin-bottom:10px;
}

h1{
text-align:center;
font-size:30px;
margin-bottom:8px;
}

.subtitle{
text-align:center;
color:#666;
margin-bottom:30px;
}

input{
width:100%;
padding:16px;
margin-bottom:14px;
border:1px solid #d1d5db;
border-radius:14px;
font-size:15px;
outline:none;
transition:.2s;
}

input:focus{
border-color:#4f46e5;
box-shadow:0 0 0 4px rgba(79,70,229,.1);
}

button{
width:100%;
padding:15px;
border:none;
border-radius:14px;
font-size:16px;
font-weight:700;
cursor:pointer;
margin-top:10px;
transition:.2s;
}

button:hover{
transform:translateY(-2px);
}

.register{
background:#4f46e5;
color:white;
}

.login{
background:#06b6d4;
color:white;
}

.google{
background:white;
border:2px solid #ddd;
}

.logout{
background:#ef4444;
color:white;
display:none;
}

.divider{
text-align:center;
margin:22px 0;
color:#888;
position:relative;
}

.divider:before,
.divider:after{
content:"";
height:1px;
background:#ddd;
width:38%;
position:absolute;
top:50%;
}

.divider:before{left:0;}
.divider:after{right:0;}

#status{
margin-top:18px;
text-align:center;
font-weight:bold;
}

#userBox{
display:none;
margin-top:20px;
padding:18px;
border-radius:18px;
background:#eef2ff;
text-align:center;
}

#userEmail{
margin-top:8px;
font-weight:bold;
word-break:break-word;
}

small{
display:block;
text-align:center;
margin-top:20px;
color:#777;
}

</style>
</head>
<body>


<div class="card">

<div class="logo">🔐</div>

<h1>Portal de Acceso</h1>
<div class="subtitle">
Crea tu cuenta o inicia sesión
</div>

<input id="email"
type="email"
placeholder="Correo electrónico">

<input id="password"
type="password"
placeholder="Contraseña">

<button class="register"
onclick="register()">
Crear cuenta
</button>

<button class="login"
onclick="login()">
Iniciar sesión
</button>

<div class="divider">
o continúa con
</div>

<button class="google"
onclick="googleLogin()">
🔵 Entrar con Google
</button>

<button id="logoutBtn"
class="logout"
onclick="logout()">
Cerrar sesión
</button>


<div id="userBox">
Sesión iniciada como:
<div id="userEmail"></div>
</div>

<div id="status"></div>

<small>
Powered by Firebase
</small>

</div>



<script type="module">

import { initializeApp }
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
GoogleAuthProvider,
signInWithPopup,
signOut,
onAuthStateChanged
}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getAnalytics
}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js";



const firebaseConfig={
apiKey:"AIzaSyByMhSnD0HWj5cArCIBfcnvS79-wlZWnXU",
authDomain:"login-adb82.firebaseapp.com",
projectId:"login-adb82",
storageBucket:"login-adb82.firebasestorage.app",
messagingSenderId:"1029138809569",
appId:"1:1029138809569:web:138595c1efc686409c6da0",
measurementId:"G-DJFLXXNLLB"
};


const app=initializeApp(firebaseConfig);
getAnalytics(app);

const auth=getAuth(app);
const provider=new GoogleAuthProvider();

const status=document.getElementById("status");
const userBox=document.getElementById("userBox");
const userEmail=document.getElementById("userEmail");
const logoutBtn=document.getElementById("logoutBtn");


function msg(text,color="green"){
status.style.color=color;
status.innerText=text;
}



window.register=()=>{

let email=document.getElementById("email").value;
let password=document.getElementById("password").value;

if(password.length<6){
msg(
"Mínimo 6 caracteres",
"red"
);
return;
}

createUserWithEmailAndPassword(
auth,
email,
password
)
.then(()=>{
msg("Cuenta creada correctamente");
})
.catch(e=>{
msg(e.message,"red");
});

}



window.login=()=>{

signInWithEmailAndPassword(
auth,
email.value,
password.value
)
.then(()=>{
msg("Bienvenido");
})
.catch(e=>{
msg(e.message,"red");
});

}



window.googleLogin=()=>{

signInWithPopup(
auth,
provider
)
.then(()=>{
msg("Entraste con Google");
})
.catch(e=>{
msg(e.message,"red");
});

}



window.logout=()=>{

signOut(auth)
.then(()=>{
msg("Sesión cerrada");
});

}



onAuthStateChanged(auth,(user)=>{

if(user){

userBox.style.display="block";
logoutBtn.style.display="block";

userEmail.innerText=user.email;

}else{

userBox.style.display="none";
logoutBtn.style.display="none";

}

});


</script>

</body>
</html>
