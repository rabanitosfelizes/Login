<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login Firebase</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#4f46e5,#06b6d4);
}

.card{
background:white;
width:380px;
padding:35px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,.18);
}

h1{
text-align:center;
margin-bottom:8px;
}

p{
text-align:center;
color:#666;
margin-bottom:25px;
}

input{
width:100%;
padding:14px;
margin-bottom:14px;
border:1px solid #ddd;
border-radius:12px;
font-size:16px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
margin-top:10px;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:.2s;
}

.btn-register{
background:#4f46e5;
color:white;
}

.btn-login{
background:#06b6d4;
color:white;
}

.btn-logout{
background:#ef4444;
color:white;
display:none;
}

button:hover{
transform:translateY(-2px);
}

#status{
margin-top:18px;
text-align:center;
font-weight:bold;
}

#userBox{
display:none;
margin-top:20px;
background:#eef2ff;
padding:15px;
border-radius:12px;
text-align:center;
}

small{
display:block;
margin-top:18px;
text-align:center;
color:#777;
}
</style>

</head>
<body>

<div class="card">

<h1>Bienvenido</h1>
<p>Regístrate o inicia sesión</p>

<input id="email" type="email" placeholder="Correo">
<input id="password" type="password" placeholder="Contraseña">

<button class="btn-register" onclick="register()">
Crear cuenta
</button>

<button class="btn-login" onclick="login()">
Iniciar sesión
</button>

<button id="logoutBtn" class="btn-logout" onclick="logout()">
Cerrar sesión
</button>

<div id="userBox">
Usuario conectado:
<div id="userEmail"></div>
</div>

<div id="status"></div>

<small>Powered by Firebase</small>

</div>



<script type="module">

import { initializeApp } from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut,
onAuthStateChanged
}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getAnalytics
}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js";



const firebaseConfig = {
apiKey:"AIzaSyByMhSnD0HWj5cArCIBfcnvS79-wlZWnXU",
authDomain:"login-adb82.firebaseapp.com",
projectId:"login-adb82",
storageBucket:"login-adb82.firebasestorage.app",
messagingSenderId:"1029138809569",
appId:"1:1029138809569:web:138595c1efc686409c6da0",
measurementId:"G-DJFLXXNLLB"
};

const app = initializeApp(firebaseConfig);
getAnalytics(app);

const auth=getAuth(app);

const status=document.getElementById("status");
const userBox=document.getElementById("userBox");
const userEmail=document.getElementById("userEmail");
const logoutBtn=document.getElementById("logoutBtn");

function msg(text,color="green"){
status.style.color=color;
status.innerText=text;
}

window.register=()=>{

const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

if(password.length<6){
msg("La contraseña debe tener mínimo 6 caracteres","red");
return;
}

createUserWithEmailAndPassword(
auth,
email,
password
)
.then(()=>{
msg("Cuenta creada correctamente");
})
.catch(error=>{
msg(error.message,"red");
});

}


window.login=()=>{

const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

signInWithEmailAndPassword(
auth,
email,
password
)
.then(()=>{
msg("Sesión iniciada");
})
.catch(error=>{
msg(error.message,"red");
});

}



window.logout=()=>{

signOut(auth)
.then(()=>{
msg("Sesión cerrada");
});

}


onAuthStateChanged(auth,(user)=>{

if(user){
userBox.style.display="block";
logoutBtn.style.display="block";
userEmail.innerText=user.email;
}else{
userBox.style.display="none";
logoutBtn.style.display="none";
}

});

</script>

</body>
</html>
