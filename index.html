<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>EduApoyo</title>

<link rel="icon" sizes="48x48" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#fbfbff;
}

.login-box{
width:470px;
background:white;
padding:55px 45px;
border-radius:34px;
border:1px solid #eef2ff;
box-shadow:0 10px 35px rgba(0,0,0,.05);
}

.logo-wrap{
display:flex;
justify-content:center;
margin-bottom:28px;
}

.logo-wrap img{
width:150px;
border-radius:25px;
}

.brand{
font-size:34px;
font-weight:700;
text-align:center;
margin-bottom:10px;
}

.sub{
text-align:center;
color:#6b7280;
margin-bottom:32px;
}

.section{
margin-bottom:20px;
}

.label{
font-size:14px;
margin-bottom:8px;
font-weight:600;
}

input{
width:100%;
padding:15px;
border:1px solid #ddd;
border-radius:15px;
margin-bottom:14px;
background:#fafafa;
font-size:15px;
}

input:focus{
outline:none;
background:white;
border-color:#c7d2fe;
box-shadow:0 0 0 4px rgba(199,210,254,.22);
}

button{
width:100%;
padding:15px;
border:none;
border-radius:15px;
font-weight:700;
font-size:15px;
cursor:pointer;
transition:.2s;
margin-top:10px;
}

button:hover{
transform:translateY(-1px);
}

.login-btn{
background:#6366f1;
color:white;
}

.register-btn{
background:#eef2ff;
color:#312e81;
}

.phone-btn{
background:#ecfeff;
}

.google-btn{
background:white;
border:1px solid #ddd;
display:flex;
justify-content:center;
align-items:center;
gap:12px;
}

.google-icon{
width:22px;
}

.separator{
text-align:center;
margin:25px 0;
position:relative;
color:#94a3b8;
}

.separator:before,
.separator:after{
content:"";
position:absolute;
top:50%;
width:38%;
height:1px;
background:#e5e7eb;
}

.separator:before{left:0;}
.separator:after{right:0;}

#verifySection{
display:none;
}

#logoutBtn{
display:none;
background:#ef4444;
color:white;
}

#userBox{
display:none;
background:#f5f7ff;
padding:15px;
border-radius:15px;
text-align:center;
margin-top:18px;
}

#status{
margin-top:15px;
text-align:center;
font-weight:600;
}

.footer{
margin-top:24px;
text-align:center;
font-size:13px;
color:#94a3b8;
}

</style>
</head>
<body>


<div class="login-box">

<div class="logo-wrap">
<img src="logo.png">
</div>

<div class="brand">
EduApoyo
</div>

<div class="sub">
Accede a tu entorno educativo
</div>


<input
id="email"
type="email"
placeholder="Correo electrónico">

<input
id="password"
type="password"
placeholder="Contraseña">


<button
class="login-btn"
onclick="login()">
Iniciar sesión
</button>

<button
class="register-btn"
onclick="register()">
Crear cuenta
</button>



<div class="separator">
o continúa con
</div>


<button
class="google-btn"
onclick="googleLogin()">

<svg class="google-icon"
viewBox="0 0 48 48">
<path fill="#EA4335"
d="M24 9.5c3.54 0 6.69 1.22 9.19 3.6l6.85-6.85C35.91 2.38 30.36 0 24 0 14.64 0 6.57 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
<path fill="#4285F4"
d="M46.5 24.5c0-1.64-.15-3.21-.42-4.72H24v8.94h12.68c-.55 2.96-2.21 5.47-4.72 7.16l7.29 5.66c4.26-3.92 6.75-9.69 6.75-17.04z"/>
<path fill="#FBBC05"
d="M10.54 28.41a14.5 14.5 0 010-8.82l-7.98-6.19A23.9 23.9 0 000 24c0 3.84.92 7.48 2.56 10.6l7.98-6.19z"/>
<path fill="#34A853"
d="M24 48c6.48 0 11.92-2.13 15.89-5.81l-7.29-5.66c-2.03 1.36-4.63 2.17-8.6 2.17-6.26 0-11.57-4.22-13.46-9.91l-7.98 6.19C6.57 42.62 14.64 48 24 48z"/>
</svg>

Continuar con Google

</button>



<div class="separator">
o ingresar por teléfono
</div>


<input
id="phone"
placeholder="+593999999999">

<button
class="phone-btn"
onclick="sendOTP()">
Enviar código SMS
</button>


<div id="verifySection">

<input
id="otp"
placeholder="Código recibido">

<button onclick="verifyOTP()">
Verificar código
</button>

</div>


<div id="recaptcha-container"></div>


<button
id="logoutBtn"
onclick="logout()">
Cerrar sesión
</button>


<div id="userBox">
Conectado como:
<div id="userEmail"></div>
</div>

<div id="status"></div>

<div class="footer">
Plataforma educativa segura
</div>

</div>



<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
GoogleAuthProvider,
signInWithPopup,
signOut,
onAuthStateChanged,
RecaptchaVerifier,
signInWithPhoneNumber
}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";



const firebaseConfig={
apiKey:"AIzaSyByMhSnD0HWj5cArCIBfcnvS79-wlZWnXU",
authDomain:"login-adb82.firebaseapp.com",
projectId:"login-adb82",
storageBucket:"login-adb82.firebasestorage.app",
messagingSenderId:"1029138809569",
appId:"1:1029138809569:web:138595c1efc686409c6da0"
};


const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const provider=new GoogleAuthProvider();


function msg(t,c="green"){
status.innerText=t;
status.style.color=c;
}



window.register=()=>{

if(password.value.length<6){
msg("Mínimo 6 caracteres","red");
return;
}

createUserWithEmailAndPassword(
auth,
email.value,
password.value
)
.then(()=>{
msg("Cuenta creada");
})
.catch(e=>msg(e.message,"red"));

}



window.login=()=>{

signInWithEmailAndPassword(
auth,
email.value,
password.value
)
.then(()=>{
msg("Sesión iniciada");
})
.catch(e=>msg(e.message,"red"));

}



window.googleLogin=()=>{

signInWithPopup(
auth,
provider
)
.then(()=>{
msg("Ingreso con Google correcto");
})
.catch(e=>msg(e.message,"red"));

}



window.sendOTP=()=>{

window.recaptcha=
new RecaptchaVerifier(
auth,
"recaptcha-container",
{}
);

signInWithPhoneNumber(
auth,
phone.value,
window.recaptcha
)
.then(result=>{
window.confirmationResult=result;
verifySection.style.display="block";
msg("Código enviado");
})
.catch(e=>{
msg(e.message,"red");
});

}



window.verifyOTP=()=>{

confirmationResult.confirm(
otp.value
)
.then(()=>{
msg("Teléfono verificado");
})
.catch(e=>{
msg("Código incorrecto","red");
});

}



window.logout=()=>{
signOut(auth);
}



onAuthStateChanged(auth,(user)=>{

if(user){

userBox.style.display="block";
logoutBtn.style.display="block";

userEmail.innerText=
user.phoneNumber || user.email;

}else{

userBox.style.display="none";
logoutBtn.style.display="none";

}

});


</script>

</body>
</html>
