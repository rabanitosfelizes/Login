<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EduApoyo</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#fcfcff;
}

.login-box{
width:430px;
background:#ffffff;
padding:55px 45px;
border-radius:30px;
box-shadow:
0 8px 30px rgba(0,0,0,.05);
border:1px solid #eef2ff;
}

/* logo educativo */
.logo-wrap{
display:flex;
justify-content:center;
margin-bottom:22px;
}

.logo-circle{
width:84px;
height:84px;
background:#f4f7ff;
border-radius:24px;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 4px 15px rgba(0,0,0,.04);
}

.logo-circle svg{
width:46px;
height:46px;
}

h1{
text-align:center;
font-size:30px;
color:#111827;
margin-bottom:8px;
}

.sub{
text-align:center;
color:#6b7280;
margin-bottom:34px;
font-size:15px;
}

input{
width:100%;
padding:16px;
border:1px solid #e5e7eb;
border-radius:15px;
margin-bottom:14px;
font-size:15px;
outline:none;
background:#fafafa;
}

input:focus{
border-color:#c7d2fe;
background:white;
box-shadow:0 0 0 4px rgba(199,210,254,.3);
}

button{
width:100%;
padding:15px;
border:none;
border-radius:15px;
font-size:15px;
font-weight:700;
cursor:pointer;
transition:.2s;
}

button:hover{
transform:translateY(-1px);
}

.login-btn{
background:#6366f1;
color:white;
margin-top:6px;
}

.register-btn{
background:#eef2ff;
color:#312e81;
margin-top:12px;
}

.google-btn{
margin-top:18px;
background:#fff;
border:1px solid #ddd;
display:flex;
justify-content:center;
align-items:center;
gap:10px;
}

.google-icon{
width:22px;
height:22px;
}

.separator{
text-align:center;
margin:24px 0;
color:#9ca3af;
position:relative;
}

.separator:before,
.separator:after{
content:"";
position:absolute;
top:50%;
width:38%;
height:1px;
background:#e5e7eb;
}

.separator:before{left:0;}
.separator:after{right:0;}

#userBox{
display:none;
margin-top:20px;
background:#f5f7ff;
padding:16px;
border-radius:15px;
text-align:center;
}

#logoutBtn{
display:none;
margin-top:15px;
background:#ef4444;
color:white;
}

#status{
margin-top:15px;
text-align:center;
font-weight:600;
}

.footer{
text-align:center;
margin-top:24px;
font-size:13px;
color:#9ca3af;
}

</style>
</head>
<body>

<div class="login-box">

<div class="logo-wrap">
<div class="logo-circle">

<!-- Icono educativo -->
<svg viewBox="0 0 64 64" fill="none">
<path d="M6 24L32 12L58 24L32 36L6 24Z"
fill="#6366F1"/>
<path d="M16 31V43C16 49 24 53 32 53C40 53 48 49 48 43V31"
stroke="#6366F1"
stroke-width="4"
stroke-linecap="round"/>
</svg>

</div>
</div>

<h1>EduApoyo</h1>

<div class="sub">
Inicia sesión para reservar tú tutoría
</div>


<input
id="email"
type="email"
placeholder="Correo institucional o personal">

<input
id="password"
type="password"
placeholder="Contraseña">


<button
class="login-btn"
onclick="login()">
Iniciar sesión
</button>


<button
class="register-btn"
onclick="register()">
Crear cuenta
</button>


<div class="separator">
o continúa con
</div>


<button
class="google-btn"
onclick="googleLogin()">

<svg class="google-icon" viewBox="0 0 48 48">
<path fill="#EA4335"
d="M24 9.5c3.54 0 6.69 1.22 9.19 3.6l6.85-6.85C35.91 2.38 30.36 0 24 0 14.64 0 6.57 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
<path fill="#4285F4"
d="M46.5 24.5c0-1.64-.15-3.21-.42-4.72H24v8.94h12.68c-.55 2.96-2.21 5.47-4.72 7.16l7.29 5.66c4.26-3.92 6.75-9.69 6.75-17.04z"/>
<path fill="#FBBC05"
d="M10.54 28.41a14.5 14.5 0 010-8.82l-7.98-6.19A23.9 23.9 0 000 24c0 3.84.92 7.48 2.56 10.6l7.98-6.19z"/>
<path fill="#34A853"
d="M24 48c6.48 0 11.92-2.13 15.89-5.81l-7.29-5.66c-2.03 1.36-4.63 2.17-8.6 2.17-6.26 0-11.57-4.22-13.46-9.91l-7.98 6.19C6.57 42.62 14.64 48 24 48z"/>
</svg>

Continuar con Google

</button>


<button
id="logoutBtn"
onclick="logout()">
Cerrar sesión
</button>


<div id="userBox">
Conectado como:
<div id="userEmail"></div>
</div>

<div id="status"></div>

<div class="footer">
Plataforma educativa segura
</div>

</div>



<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
GoogleAuthProvider,
signInWithPopup,
signOut,
onAuthStateChanged
}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


const firebaseConfig={
apiKey:"AIzaSyByMhSnD0HWj5cArCIBfcnvS79-wlZWnXU",
authDomain:"login-adb82.firebaseapp.com",
projectId:"login-adb82",
storageBucket:"login-adb82.firebasestorage.app",
messagingSenderId:"1029138809569",
appId:"1:1029138809569:web:138595c1efc686409c6da0"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const provider=new GoogleAuthProvider();

function msg(t,c="green"){
status.innerText=t;
status.style.color=c;
}

window.register=()=>{

if(password.value.length<6){
msg("Mínimo 6 caracteres","red");
return;
}

createUserWithEmailAndPassword(
auth,
email.value,
password.value
).then(()=>{
msg("Cuenta creada");
}).catch(e=>{
msg(e.message,"red");
})

}

window.login=()=>{

signInWithEmailAndPassword(
auth,
email.value,
password.value
).then(()=>{
msg("Sesión iniciada");
}).catch(e=>{
msg(e.message,"red");
})

}

window.googleLogin=()=>{

signInWithPopup(
auth,
provider
).then(()=>{
msg("Acceso con Google correcto");
}).catch(e=>{
msg(e.message,"red");
})

}

window.logout=()=>{
signOut(auth);
}

onAuthStateChanged(auth,(user)=>{

if(user){
userBox.style.display="block";
logoutBtn.style.display="block";
userEmail.innerText=user.email;
}else{
userBox.style.display="none";
logoutBtn.style.display="none";
}

});

</script>

</body>
</html>
