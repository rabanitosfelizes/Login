<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Contratar Tutor | EduApoyo</title>

<!-- Tipografía Inter -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
/* ==========================================
   VARIABLES DE DISEÑO (MISMO ECOSISTEMA)
   ========================================== */
:root {
    /* MODO CLARO */
    --bg-main: #f1f5f9; 
    --surface: #ffffff; 
    --primary: #0284c7; 
    --primary-hover: #0369a1;
    --primary-light: rgba(2, 132, 199, 0.15);
    --text-main: #0f172a;
    --text-muted: #64748b;
    --border: #cbd5e1;
    --grid-pattern: rgba(15, 23, 42, 0.05);
    --input-bg: #f8fafc;
    --input-focus-ring: rgba(2, 132, 199, 0.2);
    --success: #10b981;
    
    --shadow-sm: 0 4px 6px rgba(0,0,0,0.02);
    --shadow-md: 0 10px 20px rgba(0,0,0,0.05);
    --shadow-lg: 0 20px 40px rgba(0,0,0,0.08);
}

/* MODO NOCHE (DARK MODE) */[data-theme="dark"] {
    --bg-main: #020617; 
    --surface: #0f172a; 
    --primary: #0ea5e9; 
    --primary-hover: #38bdf8;
    --primary-light: rgba(14, 165, 233, 0.15);
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
    --border: rgba(255, 255, 255, 0.1);
    --grid-pattern: rgba(255, 255, 255, 0.04);
    --input-bg: rgba(0, 0, 0, 0.2);
    --input-focus-ring: rgba(14, 165, 233, 0.25);
    
    --shadow-lg: 0 30px 60px rgba(0,0,0,0.6);
}

* { 
    margin: 0; padding: 0; box-sizing: border-box; 
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif; 
    -webkit-font-smoothing: antialiased;
}

body {
    min-height: 100vh;
    background-color: var(--bg-main);
    color: var(--text-main);
    transition: background-color 0.5s ease, color 0.5s ease;
    overflow-x: hidden;
    position: relative;
    padding-bottom: 50px;
}

/* Patrón de Puntos (Premium Grid) */
body::before {
    content: ''; position: fixed; inset: 0; z-index: -1;
    background-image: radial-gradient(var(--grid-pattern) 1.5px, transparent 1.5px);
    background-size: 24px 24px; pointer-events: none;
    transition: background-image 0.5s ease;
}

/* ==========================================
   BARRA DE NAVEGACIÓN (NAVBAR)
   ========================================== */
.navbar {
    width: 100%; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center;
    backdrop-filter: blur(12px); border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
}
.brand-logo { display: flex; align-items: center; gap: 12px; text-decoration: none; color: var(--text-main); }
.brand-img { width: 35px; height: 35px; object-fit: contain; filter: drop-shadow(0 4px 8px var(--primary-light)); }
.brand-text { font-weight: 700; font-size: 20px; letter-spacing: -0.5px; }

.nav-actions { display: flex; align-items: center; gap: 15px; }
.btn-outline {
    background: transparent; border: 1.5px solid var(--border); color: var(--text-main);
    padding: 10px 20px; border-radius: 10px; font-weight: 600; font-size: 14px;
    cursor: pointer; transition: all 0.2s; text-decoration: none; display: flex; align-items: center; gap: 8px;
}
.btn-outline:hover { background: var(--input-bg); border-color: var(--text-muted); }

.theme-toggle {
    background: var(--surface); border: 1.5px solid var(--border); color: var(--text-main);
    border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.2s;
}
.theme-toggle:hover { background: var(--input-bg); transform: scale(1.05); }

/* ==========================================
   LAYOUT PRINCIPAL (GRID)
   ========================================== */
.container {
    max-width: 1100px; margin: 40px auto 0 auto; padding: 0 20px;
    display: grid; grid-template-columns: 1fr 380px; gap: 30px;
    opacity: 0; transform: translateY(20px);
    animation: fadeUpIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}
@keyframes fadeUpIn { to { opacity: 1; transform: translateY(0); } }

/* ==========================================
   PANEL IZQUIERDO: DETALLES Y FORMULARIO
   ========================================== */
.panel-card {
    background: var(--surface); border-radius: 24px; padding: 35px;
    border: 1px solid var(--border); box-shadow: var(--shadow-lg);
    transition: all 0.5s ease;
}

/* Tarjeta del Tutor */
.tutor-header { display: flex; gap: 20px; align-items: center; margin-bottom: 30px; padding-bottom: 30px; border-bottom: 1px solid var(--border); }
.tutor-img {
    width: 90px; height: 90px; border-radius: 50%; object-fit: cover;
    border: 2px solid var(--border); box-shadow: var(--shadow-md);
}
.tutor-info h1 { font-size: 24px; font-weight: 700; margin-bottom: 5px; letter-spacing: -0.5px; }
.tutor-badge {
    display: inline-flex; align-items: center; gap: 6px; background: var(--primary-light);
    color: var(--primary); padding: 6px 12px; border-radius: 8px; font-size: 13px; font-weight: 600;
}
.tutor-rating { display: flex; align-items: center; gap: 5px; margin-top: 10px; font-size: 14px; color: var(--text-muted); font-weight: 500;}
.star { color: #f59e0b; width: 16px; height: 16px; }

/* Títulos de sección */
.section-title { font-size: 18px; font-weight: 600; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
.section-title svg { color: var(--primary); width: 22px; height: 22px; }

/* Selección de Fecha y Hora (Estilo Calendly) */
.date-time-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }

.form-group { display: flex; flex-direction: column; gap: 8px; }
.form-label { font-size: 13.5px; font-weight: 600; color: var(--text-main); }
.input-premium {
    width: 100%; padding: 14px 18px; border: 1.5px solid var(--border); border-radius: 12px;
    background: var(--input-bg); color: var(--text-main); font-size: 15px; font-family: inherit;
    transition: all 0.2s;
}
.input-premium:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px var(--input-focus-ring); background: transparent; }
textarea.input-premium { resize: vertical; min-height: 100px; }

/* Botones de Horas (Radio chips) */
.time-slots { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.time-slot {
    position: relative; cursor: pointer; text-align: center;
}
.time-slot input { display: none; }
.time-label {
    display: block; padding: 12px 0; border: 1.5px solid var(--border); border-radius: 10px;
    background: var(--input-bg); color: var(--text-main); font-size: 14px; font-weight: 600;
    transition: all 0.2s;
}
.time-slot:hover .time-label { border-color: var(--text-muted); }
.time-slot input:checked + .time-label {
    background: var(--primary); border-color: var(--primary); color: white;
    box-shadow: 0 4px 12px var(--primary-light);
}

/* ==========================================
   PANEL DERECHO: RESUMEN Y PAGO (STICKY)
   ========================================== */
.summary-panel {
    position: sticky; top: 100px; height: fit-content;
    background: var(--surface); border-radius: 24px; padding: 30px;
    border: 1px solid var(--border); box-shadow: var(--shadow-lg);
    display: flex; flex-direction: column; gap: 20px;
}

.summary-title { font-size: 18px; font-weight: 700; border-bottom: 1px solid var(--border); padding-bottom: 15px; }

.summary-row { display: flex; justify-content: space-between; font-size: 15px; color: var(--text-muted); font-weight: 500; }
.summary-row.total { font-size: 20px; color: var(--text-main); font-weight: 700; border-top: 1px solid var(--border); padding-top: 15px; margin-top: 5px; }

.btn-primary {
    width: 100%; padding: 16px; border: none; border-radius: 14px;
    background: linear-gradient(135deg, var(--primary), var(--primary-hover)); color: white;
    font-weight: 600; font-size: 16px; cursor: pointer; transition: all 0.2s;
    display: flex; justify-content: center; align-items: center; gap: 10px;
    box-shadow: 0 4px 15px var(--primary-light);
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px var(--primary-light); }
.btn-primary:active { transform: scale(0.98); }

.safe-checkout {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    font-size: 12px; color: var(--text-muted); font-weight: 500; margin-top: 10px; text-align: center;
}

/* Toast */
#toast {
    position: fixed; top: 25px; left: 50%; transform: translateX(-50%) translateY(-100px);
    background: var(--surface); color: var(--text-main); border: 1px solid var(--border);
    padding: 14px 28px; border-radius: 100px; font-size: 14.5px; font-weight: 600; 
    box-shadow: var(--shadow-lg); transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55), opacity 0.4s;
    z-index: 1000; display: flex; align-items: center; gap: 10px; opacity: 0; pointer-events: none;
}
#toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* Responsive */
@media (max-width: 900px) {
    .container { grid-template-columns: 1fr; }
    .summary-panel { position: relative; top: 0; margin-bottom: 40px; }
    .date-time-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div id="toast"></div>

<!-- NAVBAR -->
<nav class="navbar">
    <a href="#" class="brand-logo" onclick="window.history.back()">
        <img src="logo.png" alt="Logo" class="brand-img">
        <span class="brand-text">EduApoyo</span>
    </a>
    <div class="nav-actions">
        <a href="#" class="btn-outline" onclick="window.history.back()">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            Volver
        </a>
        <button class="theme-toggle" onclick="toggleTheme()" aria-label="Cambiar tema">
            <svg id="themeIcon" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
            </svg>
        </button>
    </div>
</nav>

<!-- CONTENEDOR PRINCIPAL -->
<div class="container">
    
    <!-- LADO IZQUIERDO (FORMULARIO) -->
    <div class="panel-card">
        
        <!-- Tarjeta del Tutor Elegido -->
        <div class="tutor-header">
            <!-- Imagen genérica profesional para el ejemplo de "Oscar Jose Prieto" -->
            <img src="https://images.unsplash.com/photo-1560250097-0b93528c311a?auto=format&fit=crop&w=200&q=80" alt="Oscar Jose Prieto Castro" class="tutor-img">
            <div class="tutor-info">
                <h1>Oscar Jose Prieto Castro</h1>
                <div class="tutor-badge">
                    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                    Marketing - Diseño Gráfico
                </div>
                <div class="tutor-rating">
                    <svg class="star" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path></svg>
                    4.9 (120 reseñas) • Tutor Verificado
                </div>
            </div>
        </div>

        <h2 class="section-title">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
            Programa tu clase
        </h2>

        <!-- Fecha y Hora -->
        <div class="date-time-grid">
            <div class="form-group">
                <label class="form-label">Selecciona una fecha</label>
                <!-- Usamos input date nativo estlizado -->
                <input type="date" class="input-premium" id="classDate" required>
            </div>
            
            <div class="form-group">
                <label class="form-label">Horarios disponibles</label>
                <div class="time-slots">
                    <label class="time-slot">
                        <input type="radio" name="time" value="09:00" checked>
                        <span class="time-label">09:00 AM</span>
                    </label>
                    <label class="time-slot">
                        <input type="radio" name="time" value="11:30">
                        <span class="time-label">11:30 AM</span>
                    </label>
                    <label class="time-slot">
                        <input type="radio" name="time" value="15:00">
                        <span class="time-label">03:00 PM</span>
                    </label>
                    <label class="time-slot">
                        <input type="radio" name="time" value="17:00">
                        <span class="time-label">05:00 PM</span>
                    </label>
                </div>
            </div>
        </div>

        <h2 class="section-title" style="margin-top: 40px;">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
            Detalles de la sesión
        </h2>

        <div class="form-group">
            <label class="form-label">Tema a tratar o mensaje para el tutor</label>
            <textarea class="input-premium" placeholder="Hola Oscar, necesito ayuda con un proyecto de diseño de logotipos..."></textarea>
        </div>

    </div>

    <!-- LADO DERECHO (RESUMEN DE COMPRA) -->
    <div class="summary-panel">
        <h3 class="summary-title">Resumen de Contratación</h3>
        
        <div class="summary-row">
            <span>Tutoría (1 hora)</span>
            <span>$15.00</span>
        </div>
        <div class="summary-row">
            <span>Servicio de plataforma</span>
            <span>$1.50</span>
        </div>
        
        <div class="summary-row total">
            <span>Total a pagar</span>
            <span>$16.50 USD</span>
        </div>

        <button class="btn-primary" onclick="confirmBooking()">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            Confirmar y Pagar
        </button>

        <div class="safe-checkout">
            <svg width="14" height="14" fill="currentColor" viewBox="0 0 16 16">
                <path d="M8 1a2 2 0 0 1 2 2v4H6V3a2 2 0 0 1 2-2zm3 6V3a3 3 0 0 0-6 0v4a2 2 0 0 0-2 2v5a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/>
            </svg>
            Transacción cifrada y segura 256-bit
        </div>
    </div>

</div>

<script>
// Manejo del Tema Oscuro / Claro
function toggleTheme() {
    const html = document.documentElement;
    const current = html.getAttribute('data-theme');
    const newTheme = current === 'light' ? 'dark' : 'light';
    html.setAttribute('data-theme', newTheme);
    localStorage.setItem('theme', newTheme);
    
    const icon = document.getElementById('themeIcon');
    if (newTheme === 'dark') {
        icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>`; 
    } else {
        icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>`; 
    }
}

// Cargar preferencia guardada
if (localStorage.getItem('theme')) {
    const savedTheme = localStorage.getItem('theme');
    document.documentElement.setAttribute('data-theme', savedTheme);
    if(savedTheme === 'light') toggleTheme(); toggleTheme(); 
}

// Configurar que la fecha mínima seleccionable sea hoy
document.addEventListener("DOMContentLoaded", () => {
    const today = new Date().toISOString().split('T')[0];
    document.getElementById("classDate").setAttribute('min', today);
});

// Toast / Alerta de confirmación
let toastTimer;
function showToast(msg, type = "success") {
    const toast = document.getElementById("toast");
    const icon = type === 'success' ? '✅' : '⚠️';
    toast.innerHTML = `<span style="font-size: 18px;">${icon}</span> ${msg}`;
    toast.className = 'show';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { toast.classList.remove("show"); }, 4000);
}

// Función al darle a pagar
function confirmBooking() {
    const dateInput = document.getElementById("classDate").value;
    if(!dateInput) {
        showToast("Por favor selecciona una fecha para la clase", "error");
        return;
    }
    
    const btn = document.querySelector('.btn-primary');
    btn.innerHTML = `<div style="width:20px; height:20px; border:3px solid rgba(255,255,255,0.3); border-top-color:white; border-radius:50%; animation:spin 1s linear infinite;"></div> Procesando...`;
    
    // Simulamos una carga de 2 segundos y redirigimos
    setTimeout(() => {
        showToast("¡Reserva confirmada con éxito!");
        // Aquí puedes redirigir al panel del estudiante o a la pasarela de pagos
        // window.location.href = "URL_DE_PAGO";
        setTimeout(() => {
            btn.innerHTML = `<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> Confirmar y Pagar`;
        }, 1500);
    }, 2000);
}

// Keyframes para el spinner del botón
const style = document.createElement('style');
style.innerHTML = `@keyframes spin { 100% { transform: rotate(360deg); } }`;
document.head.appendChild(style);
</script>

</body>
</html>
