<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EduApoyo</title>
<link rel="icon" sizes="48x48" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
body { min-height: 100vh; display: flex; justify-content: center; align-items: center; background: #fbfbff; padding: 20px; }
.login-box { width: 470px; background: white; padding: 55px 45px; border-radius: 34px; border: 1px solid #eef2ff; box-shadow: 0 10px 35px rgba(0,0,0,.05); }
.logo-wrap { display: flex; justify-content: center; margin-bottom: 28px; }
.logo-wrap img { width: 150px; border-radius: 25px; }
.brand { font-size: 34px; font-weight: 700; text-align: center; margin-bottom: 10px; color: #1f2937; }
.sub { text-align: center; color: #6b7280; margin-bottom: 32px; }
input, select { width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 15px; margin-bottom: 14px; background: #fafafa; font-size: 15px; color: #374151; }
input:focus, select:focus { outline: none; background: white; border-color: #c7d2fe; box-shadow: 0 0 0 4px rgba(199,210,254,.22); }

.phone-group { display: flex; gap: 10px; margin-bottom: 14px; }
.phone-group select { width: 35%; margin-bottom: 0; cursor: pointer; }
.phone-group input { width: 65%; margin-bottom: 0; }

button { width: 100%; padding: 15px; border: none; border-radius: 15px; font-weight: 700; font-size: 15px; cursor: pointer; transition: .2s; margin-top: 10px; }
button:hover { transform: translateY(-2px); }
.login-btn { background: #6366f1; color: white; }
.login-btn:disabled { background: #a5a6f6; cursor: not-allowed; transform: none; }
.register-btn { background: #eef2ff; color: #312e81; }
.phone-btn { background: #ecfeff; color: #0891b2; }
.google-btn { background: white; border: 1px solid #ddd; display: flex; justify-content: center; align-items: center; gap: 12px; color: #374151; }
.google-icon { width: 22px; }
.separator { text-align: center; margin: 25px 0; position: relative; color: #94a3b8; font-size: 14px; }
.separator:before, .separator:after { content: ""; position: absolute; top: 50%; width: 35%; height: 1px; background: #e5e7eb; }
.separator:before { left: 0; } .separator:after { right: 0; }

#verifySection { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px dashed #ddd; }
#logoutBtn { display: none; background: #ef4444; color: white; }
#userBox { display: none; background: #f5f7ff; padding: 15px; border-radius: 15px; text-align: center; margin-top: 18px; color: #374151; }
#userEmail { font-weight: bold; color: #6366f1; margin-top: 5px; }
#status { margin-top: 15px; text-align: center; font-weight: 600; font-size: 14px; line-height: 1.4; }
.footer { margin-top: 24px; text-align: center; font-size: 13px; color: #94a3b8; }
</style>
</head>
<body>

<div class="login-box">

    <div class="logo-wrap">
        <img src="logo.png" alt="EduApoyo">
    </div>

    <div class="brand">EduApoyo</div>
    <div class="sub">Accede a tu entorno educativo</div>

    <input id="email" type="email" placeholder="Correo electrónico">
    <input id="password" type="password" placeholder="Contraseña">

    <button class="login-btn" onclick="login()">Iniciar sesión</button>
    <button class="register-btn" onclick="register()">Crear cuenta</button>

    <div class="separator">o continúa con</div>

    <button class="google-btn" onclick="googleLogin()">
        <svg class="google-icon" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.69 1.22 9.19 3.6l6.85-6.85C35.91 2.38 30.36 0 24 0 14.64 0 6.57 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.5 24.5c0-1.64-.15-3.21-.42-4.72H24v8.94h12.68c-.55 2.96-2.21 5.47-4.72 7.16l7.29 5.66c4.26-3.92 6.75-9.69 6.75-17.04z"/>
            <path fill="#FBBC05" d="M10.54 28.41a14.5 14.5 0 010-8.82l-7.98-6.19A23.9 23.9 0 000 24c0 3.84.92 7.48 2.56 10.6l7.98-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.92-2.13 15.89-5.81l-7.29-5.66c-2.03 1.36-4.63 2.17-8.6 2.17-6.26 0-11.57-4.22-13.46-9.91l-7.98 6.19C6.57 42.62 14.64 48 24 48z"/>
        </svg>
        Continuar con Google
    </button>

    <div class="separator">o ingresar por teléfono</div>

    <div class="phone-group">
        <select id="countryCode">
            <option value="+593">🇪🇨 +593</option>
            <option value="+52">🇲🇽 +52</option>
            <option value="+57">🇨🇴 +57</option>
            <option value="+51">🇵🇪 +51</option>
            <option value="+56">🇨🇱 +56</option>
            <option value="+54">🇦🇷 +54</option>
            <option value="+34">🇪🇸 +34</option>
            <option value="+1">🇺🇸 +1</option>
        </select>
        <input id="phoneNumber" type="tel" placeholder="Número celular">
    </div>

    <button id="sendSmsBtn" class="phone-btn" onclick="sendOTP()">Enviar código SMS</button>

    <div id="verifySection">
        <p style="font-size: 13px; color: #6b7280; margin-bottom: 8px; text-align: center;">Ingresa el código de 6 dígitos</p>
        <input id="otp" type="number" placeholder="Código recibido">
        <button id="verifyBtn" class="login-btn" onclick="verifyOTP()">Verificar e Ingresar</button>
    </div>

    <div id="recaptcha-container"></div>

    <div id="userBox">
        Conectado como:
        <div id="userEmail"></div>
    </div>
    <button id="logoutBtn" onclick="logout()">Cerrar sesión</button>

    <div id="status"></div>
    <div class="footer">Plataforma educativa segura</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
    getAuth,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    GoogleAuthProvider,
    signInWithPopup,
    signOut,
    onAuthStateChanged,
    RecaptchaVerifier,
    signInWithPhoneNumber
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyByMhSnD0HWj5cArCIBfcnvS79-wlZWnXU",
    authDomain: "login-adb82.firebaseapp.com",
    projectId: "login-adb82",
    storageBucket: "login-adb82.firebasestorage.app",
    messagingSenderId: "1029138809569",
    appId: "1:1029138809569:web:138595c1efc686409c6da0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

function msg(t, c = "green") {
    const statusDiv = document.getElementById('status');
    statusDiv.innerText = t;
    statusDiv.style.color = c;
    // Damos más tiempo para que se pueda leer bien el error
    if(c === "red") setTimeout(() => { statusDiv.innerText = ""; }, 8000);
}

window.register = () => {
    const emailStr = document.getElementById('email').value;
    const passStr = document.getElementById('password').value;
    if (passStr.length < 6) return msg("La contraseña debe tener mínimo 6 caracteres", "red");
    createUserWithEmailAndPassword(auth, emailStr, passStr)
        .then(() => msg("Cuenta creada con éxito"))
        .catch(e => msg("Error: " + e.message, "red"));
}

window.login = () => {
    const emailStr = document.getElementById('email').value;
    const passStr = document.getElementById('password').value;
    signInWithEmailAndPassword(auth, emailStr, passStr)
        .then(() => msg("Sesión iniciada"))
        .catch(e => msg("Error: " + e.message, "red"));
}

window.googleLogin = () => {
    signInWithPopup(auth, provider)
        .then(() => msg("Ingreso con Google correcto"))
        .catch(e => msg("Error: " + e.message, "red"));
}

// ----------------------------------------------------
// MANEJO DE SMS (PROTEGIDO CONTRA ERRORES EN GITHUB)
// ----------------------------------------------------
window.sendOTP = () => {
    const code = document.getElementById('countryCode').value;
    const number = document.getElementById('phoneNumber').value;

    if (number.trim() === "" || number.length < 7) {
        msg("Por favor, ingresa un número válido", "red");
        return;
    }

    const fullPhoneNumber = code + number.trim();
    msg("Validando seguridad y conectando...", "#6366f1");

    const btn = document.getElementById('sendSmsBtn');
    btn.disabled = true;

    // Se crea la instancia del reCAPTCHA justo al dar clic
    if (!window.recaptchaVerifier) {
        window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
            'size': 'invisible'
        });
    }

    signInWithPhoneNumber(auth, fullPhoneNumber, window.recaptchaVerifier)
        .then((confirmationResult) => {
            window.confirmationResult = confirmationResult;
            document.getElementById('verifySection').style.display = "block";
            btn.disabled = false;
            msg("Código enviado con éxito", "green");
        })
        .catch((error) => {
            console.error("Error completo de Firebase:", error);
            btn.disabled = false;
            
            // Si Firebase rechaza, destruimos el reCaptcha para que pueda reintentar
            if(window.recaptchaVerifier) {
                window.recaptchaVerifier.clear();
                window.recaptchaVerifier = null;
            }

            // Atrapamos el famoso Error 39 de Firebase
            if(error.message.includes("error-code:-39")) {
                msg("⛔ Error de Seguridad (-39): Firebase bloqueó el SMS. Agrega tu dominio a la lista blanca de Firebase o intenta usando un número de prueba.", "red");
            } else {
                msg("Error: " + error.message, "red");
            }
        });
}

window.verifyOTP = () => {
    const otpCode = document.getElementById('otp').value;
    if(!otpCode) return msg("Ingresa el código", "red");

    document.getElementById('verifyBtn').disabled = true;

    window.confirmationResult.confirm(otpCode)
        .then(() => {
            msg("Teléfono verificado correctamente", "green");
            document.getElementById('verifySection').style.display = "none";
            document.getElementById('verifyBtn').disabled = false;
        })
        .catch((error) => {
            msg("Código incorrecto o expirado", "red");
            document.getElementById('verifyBtn').disabled = false;
        });
}

window.logout = () => {
    signOut(auth).then(() => {
        msg("Sesión cerrada", "#6b7280");
        document.getElementById('verifySection').style.display = "none";
        document.getElementById('phoneNumber').value = "";
        document.getElementById('otp').value = "";
    });
}

onAuthStateChanged(auth, (user) => {
    const userBox = document.getElementById('userBox');
    const logoutBtn = document.getElementById('logoutBtn');
    const userEmail = document.getElementById('userEmail');

    if (user) {
        userBox.style.display = "block";
        logoutBtn.style.display = "block";
        userEmail.innerText = user.phoneNumber || user.email || "Usuario sin datos";
    } else {
        userBox.style.display = "none";
        logoutBtn.style.display = "none";
    }
});
</script>

</body>
</html>
