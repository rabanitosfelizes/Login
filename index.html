<!DOCTYPE html>
<html>
<body>

<h2>Registro / Inicio de sesión</h2>

<input id="email" type="email" placeholder="Correo">
<input id="password" type="password" placeholder="Contraseña">

<button onclick="register()">Registrarse</button>
<button onclick="login()">Entrar</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
 getAuth,
 createUserWithEmailAndPassword,
 signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


// Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
import { getAnalytics } from "firebase/analytics";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyByMhSnD0HWj5cArCIBfcnvS79-wlZWnXU",
  authDomain: "login-adb82.firebaseapp.com",
  projectId: "login-adb82",
  storageBucket: "login-adb82.firebasestorage.app",
  messagingSenderId: "1029138809569",
  appId: "1:1029138809569:web:138595c1efc686409c6da0",
  measurementId: "G-DJFLXXNLLB"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);


window.register = function(){
createUserWithEmailAndPassword(
auth,
email.value,
password.value
)
.then(()=>alert("Usuario registrado"));
}

window.login = function(){
signInWithEmailAndPassword(
auth,
email.value,
password.value
)
.then(()=>alert("Sesión iniciada"));
}

</script>

</body>
</html>
